# Server
server.port=${PORT:8080}

# PostgreSQL. Never commit credentials; configure these environment variables in Render.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:codeflow}?sslmode=${DB_SSLMODE:require}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# Dialect is auto-detected from datasource — no need to specify explicitly
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false

# Optional
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.codeflow=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.security=INFO
